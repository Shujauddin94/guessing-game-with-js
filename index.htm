<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#581020">
    <link rel="stylesheet" href="style.css">
    <title>Guess My Number</title>
</head>
<body>
    <header>
    <h1>Guess My Number!</h1>
    <p class="between">(Between 1 and 20)</p>
    <button type="button" class="btn_again">Again!</button>
    <div class="number">?</div>
    </header>
    <main>
        <section class="left">
            <input type="number" class="guess" placeholder="?" min="1" max="20" step="1" maxlength="2" aria-label="Your guess" autocomplete="off" inputmode="numeric" autofocus />
            <p class="helper-text">Press Enter to check</p>
            <button type="button" class="btn_check">Check!</button>
        </section>
        <section class="right">
            <div class="msg">
            <p class="message" aria-live="polite">Start guessing...</p></div>
            <p class="label-score">Chances: <span class="score">20</span></p>
            <div class="score-bar"><div class="score-bar-fill"></div></div>
            <p class="label-highscore">Highscore: <span class="highscore ">0</span></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
