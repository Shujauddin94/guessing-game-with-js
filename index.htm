<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#581020">
    <link rel="stylesheet" href="style.css">
    <title>Guess My Number</title>
</head>
<body>
    <header>
    <h1>Guess My Number!</h1>
    <p class="between">(Between 1 and 20)</p>
    <button type="button" class="btn_again">Again!</button>
    <div class="number">?</div>
    </header>
    <main>
        <section class="left">
            <input type="number" class="guess" placeholder="?" min="1" max="20" step="1" maxlength="2" aria-label="Enter your guess" aria-describedby="guess-help guess-shortcuts" autocomplete="off" inputmode="numeric" autofocus />
            <p class="helper-text" id="guess-help">Press Enter to check</p>
            <p class="helper-text helper-text--secondary" id="guess-shortcuts">Press Esc to reset</p>
            <div class="shortcut-badge" aria-label="Keyboard shortcuts available">⌨️ Enter / Esc</div>
            <button type="button" class="btn_check" aria-label="Check your guess">Check!</button>
        </section>
        <section class="right">
            <div class="msg">
            <p class="message" aria-live="polite">Start guessing...</p></div>
            <p class="hint">Hint: We'll tell you if you're close.</p>
            <p class="label-score">Chances: <span class="score">20</span></p>
            <p class="label-attempts">Attempts: <span class="attempts">0</span></p>
            <p class="label-round">Round: <span class="round">1</span></p>
            <p class="label-history">Previous guesses: <span class="history">None yet</span></p>
            <p class="label-last">Last guess: <span class="last-guess">—</span></p>
            <div class="score-bar"><div class="score-bar-fill"></div></div>
            <p class="label-highscore">Highscore: <span class="highscore">0</span></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
